# ---------------------------------------------------------------------------
# Cloudflare Real-IP passthrough
# Nginx sees Cloudflare's edge IPs; these directives replace $remote_addr
# with the visitor's actual IP from the CF-Connecting-IP header.
# Keep this list current: https://www.cloudflare.com/ips/
# ---------------------------------------------------------------------------
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
real_ip_header CF-Connecting-IP;

# ---------------------------------------------------------------------------
# Shared proxy header snippet — referenced in every location block below.
# (Nginx doesn't support named snippets in conf.d files, so we inline them,
#  but they're grouped here for visibility.)
# ---------------------------------------------------------------------------
# proxy_set_header Host              $host;
# proxy_set_header X-Real-IP         $remote_addr;   ← real after CF passthrough
# proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
# proxy_set_header X-Forwarded-Proto $scheme;

# ===========================================================================
# HOW TO ADD A NEW APPLICATION
# 1. Copy the two server blocks (80 + 443) from any existing app below.
# 2. Replace server_name and proxy_pass with the new domain and service name.
# 3. Comment out the 443 block until the cert is issued (see BOOTSTRAP below).
# 4. Issue the cert:
#      docker compose run --rm certbot certonly \
#        --webroot -w /var/www/certbot -d <new-domain>
# 5. Uncomment the 443 block and reload: docker compose exec nginx nginx -s reload
# ===========================================================================


# ===========================================================================
# letter.dpsg-langenbach.de  →  dpsg-letter stack (frontend:3000, backend:8080)
# ===========================================================================

server {
    listen 80;
    server_name letter.dpsg-langenbach.de;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name letter.dpsg-langenbach.de;

    ssl_certificate     /etc/letsencrypt/live/letter.dpsg-langenbach.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/letter.dpsg-langenbach.de/privkey.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/ {
        proxy_pass http://letter-backend:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://letter-frontend:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}


# ===========================================================================
# schmidmeier.dev  →  personal-website stack (personal-website:3000)
# ===========================================================================

server {
    listen 80;
    server_name schmidmeier.dev;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# BOOTSTRAP: comment this block out on first deploy until the cert exists.
# See "HOW TO ADD A NEW APPLICATION" above.
server {
    listen 443 ssl;
    server_name schmidmeier.dev;

    ssl_certificate     /etc/letsencrypt/live/schmidmeier.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/schmidmeier.dev/privkey.pem;
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://personal-website:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
